name: US Stock Data Update

on:
  schedule:
    # 1回目：日本時間 朝 07:00 (UTC 22:00) -> 昨晩の確定データでじっくり分析
    # 2回目：日本時間 夜 23:30 (UTC 14:30) -> 今夜の開始直後の勢いを確認
    - cron: '0 14,22 * * *'
  workflow_dispatch: # ボタンから手動実行も可能

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          pip install yfinance pandas
          
      - name: Run Scraper
        run: python src/scraper.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock_data.csv
          git commit -m "定期更新: $(date)"
          git push
